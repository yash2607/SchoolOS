version: "3.9"

# ── Local dev environment (mirrors Railway production) ─────────────────────────
# Usage: docker compose up -d
# Then run each service with: cd backend/services/auth && pnpm dev

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: schoolos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoolos
      POSTGRES_PASSWORD: schoolos_dev
      POSTGRES_DB: schoolos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: schoolos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional DB browser) ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: schoolos_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@schoolos.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools   # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:
