worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Use /tmp for client body — writable in Railway
  client_body_temp_path /tmp/nginx_client_body;
  proxy_temp_path       /tmp/nginx_proxy;

  upstream auth         { server 127.0.0.1:4101; }
  upstream student      { server 127.0.0.1:4102; }
  upstream attendance   { server 127.0.0.1:4103; }
  upstream academic     { server 127.0.0.1:4104; }
  upstream finance      { server 127.0.0.1:4105; }
  upstream communication { server 127.0.0.1:4107; }
  upstream notification { server 127.0.0.1:4106; }
  upstream timetable    { server 127.0.0.1:4108; }

  server {
    listen NGINX_PORT;

    # ── Auth ────────────────────────────────────────────────────────────────
    location /api/v1/auth {
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Students / Guardians / Roster ───────────────────────────────────────
    location /api/v1/students {
      proxy_pass http://student;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/sections {
      proxy_pass http://student;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/me/children {
      proxy_pass http://student;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/grades {
      proxy_pass http://student;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/schools {
      proxy_pass http://student;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Attendance ───────────────────────────────────────────────────────────
    location /api/v1/attendance {
      proxy_pass http://attendance;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/leave {
      proxy_pass http://attendance;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Timetable ────────────────────────────────────────────────────────────
    location /api/v1/timetable {
      proxy_pass http://timetable;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/periods {
      proxy_pass http://timetable;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/calendar {
      proxy_pass http://timetable;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Academics ────────────────────────────────────────────────────────────
    location /api/v1/subjects {
      proxy_pass http://academic;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/assignments {
      proxy_pass http://academic;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/grades-book {
      proxy_pass http://academic;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Finance ──────────────────────────────────────────────────────────────
    location /api/v1/fees {
      proxy_pass http://finance;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/payments {
      proxy_pass http://finance;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/invoices {
      proxy_pass http://finance;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Communication ─────────────────────────────────────────────────────────
    location /api/v1/threads {
      proxy_pass http://communication;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/announcements {
      proxy_pass http://communication;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Notifications ─────────────────────────────────────────────────────────
    location /api/v1/notifications {
      proxy_pass http://notification;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/devices {
      proxy_pass http://notification;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health ────────────────────────────────────────────────────────────────
    location /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }
}
